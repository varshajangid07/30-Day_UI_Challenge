<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight Hover Effect</title>
  <style>
    body {
      background-color: #0d0d12;
      color: #ececf1;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      position: relative;
      width: 350px;
      padding: 2px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
          rgba(120, 119, 198, 0.4),
          transparent 40%);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 1;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-content {
      position: relative;
      background-color: #13131a;
      border-radius: 14px;
      padding: 40px 30px;
      height: 100%;
      z-index: 2;
      box-sizing: border-box;
    }

    .card-content h2 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .card-content p {
      margin: 0;
      color: #9494a0;
      line-height: 1.6;
    }

    .card-content::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
          rgba(255, 255, 255, 0.04),
          transparent 40%);
      opacity: 0;
      transition: opacity 0.5s;
      border-radius: inherit;
      pointer-events: none;
    }

    .card:hover .card-content::before {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="card" id="spotlight-card">
    <div class="card-content">
      <h2>Spotlight Effect</h2>
      <p>Move your cursor over this card. Notice how the border and background illuminate exactly where your mouse is
        pointing, creating a premium 3D lighting effect.</p>
    </div>
  </div>

  <script>
    const card = document.getElementById('spotlight-card');

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();

      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);
    });
  </script>
</body>
</html>
