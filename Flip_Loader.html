<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Loader</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        section{
            width: 100%;
            height: 100vh;
            background: rgb(43, 43, 43);
        }
        div{
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 10px;
            animation: animate 2s linear infinite;
        }
        @keyframes animate{
            0%{
                transform: translate(-50%, -50%) perspective(200px) rotateX(0deg) rotateY(0deg);
            }
            50%{
                transform: translate(-50%, -50%) perspective(200px) rotateX(180deg) rotateY(0deg);
            }
            100%{
                transform: translate(-50%, -50%) perspective(200px) rotateX(180deg) rotateY(-180deg);
            }
        }
    </style>
</head>
<body>
    <section>
        <div></div>
    </section>
</body>
</html>
