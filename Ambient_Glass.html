<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Glass</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        section{
            position: absolute;
            width: 100%;
            height: 100vh;
            
            overflow: hidden;
        }
        .bg{
            width: 100%;
            height: 100%;
            animation: bganimate 15s linear infinite;
        }
        .bg span{
            width: 80px;
            height: 80px;
            position: absolute;
            background: rgb(255, 255, 255);
        }
        .bg span:nth-child(1){
            top:10%;
            left: 50%;
            animation: spananimate 9s linear infinite;
        }
        .bg span:nth-child(2){
            top:50%;
            left: 45%;
            animation: spananimate 18s linear infinite;
        }
        .bg span:nth-child(3){
            top:30%;
            left: 80%;
            animation: spananimate 14s linear infinite;
        }
        .bg span:nth-child(4){
            top:90%;
            left: 10%;
            animation: spananimate 8s linear infinite;
        }
        .bg span:nth-child(5){
            top:95%;
            left: 50%;
            animation: spananimate 20s linear infinite;
        }
        .bg span:nth-child(6){
            top:80%;
            left: 80%;
            animation: spananimate 10s linear infinite;
        }
        .bg span:nth-child(7){
            top:60%;
            left: 75%;
            animation: spananimate 7s linear infinite;
        }
        .bg span:nth-child(8){
            top:40%;
            left: 20%;
            animation: spananimate 9s linear infinite;
        }
        .bg span:nth-child(9){
            top:55%;
            left: 0%;
            animation: spananimate 15s linear infinite;
        }
        .bg span:nth-child(10){
            top:0%;
            left: 85%;
            animation: spananimate 10s linear infinite;
        }
        .bg span:nth-child(3n+1){
            background: transparent;
            border: 5px solid white;
        }
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.23); 
            backdrop-filter: blur(5px);          
            -webkit-backdrop-filter: blur(5px);   
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 20px;
            box-shadow: 0 8px 30px 0 rgba(0, 0, 0, 0.15); 
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: #000000;
            text-align: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease  ;
        }
        .box:hover{
            transform: translate(-50%, -50%) translateY(-10px);
            box-shadow: 0 20px 50px 0 rgb(0, 0, 0, 0.25);
        }
        @keyframes spananimate{
            0%{
                transform: scale(0) translateY(0) rotate(0) ;
                opacity: 1;
            }
            100%{
                transform: scale(1) translateY(-100px) rotate(360deg) ;
                opacity: 0;
            }
        }
        @keyframes bganimate{
            0%{
                background: #FFCFE4;
            }
            25%{
                background: #FFDFBE;
            }
            50%{
                background: #DEECF5;
            }
            70%{
                background: #F8AA80;
            }
            100%{
                background: #E2889F;
            }
        }

    </style>
</head>

<body>
    <section>
        <div class="bg">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="box">
            <h2>It's say</h2>
            <p>Hello World!!</p>
        </div>
    </section>
</body>

</html>
