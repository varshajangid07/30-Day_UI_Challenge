<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Element</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
        }

        h1{
            font-size: 40px;
        }
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FF3366, #7f00ff, #00d2ff);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(127, 0, 255, 0.6);
            animation: animate 4s ease-in-out infinite;
        }

        @keyframes animate{
            0%{
                transform: translateY(0px) scale(1);
                box-shadow: 0 10px 40px rgba(127, 0, 255, 0.6);
            }
            50%{
                transform: translateY(-20px) scale(1.05);
                box-shadow: 0 20px 50px rgba(127, 0, 255, 0.8);
            }
            100%{
                transform: translateY(0px) scale(1);
                box-shadow: 0 10px 40px rgba(127, 0, 255, 0.6);
            }
        }
    </style>
</head>
<body>
    <h1>Floating Element</h1>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
