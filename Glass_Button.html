<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Button</title>
    <style>
        :root {
            --bg-ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: #000;
            overflow: hidden;
        }

        .background-mesh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.4), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.4), transparent 25%);
            animation: animate 5s var(--bg-ease) infinite alternate;
            z-index: 0;
        }

        @keyframes animate {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .glass-btn {
            position: relative;
            z-index: 1;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.4s var(--bg-ease);
            overflow: hidden;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
        }

        .glass-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right,  rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-20deg);
            transition: left 0.6s var(--bg-ease);
        }

        .glass-btn:hover::before {
            left: 200%;
            transition: left 0.8s var(--bg-ease);
        }
    </style>
</head>
<body>
    <h1>Glass Button</h1>
    <div class="background-mesh"></div>
    <button class="glass-btn">Click me!</button>
</body>
</html>
