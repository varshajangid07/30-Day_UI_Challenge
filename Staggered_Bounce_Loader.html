<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staggered Bounce Loader</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        section{
            width: 100%;
            height: 100vh;
            background: rgb(43, 43, 43);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        section div{
            width: 50px;
            height: 50px;
            background-color: yellow;
            box-shadow: 0 5px 5px 0 rgb(0, 0, 0, 0.25);
        }
        section :nth-child(1){
            animation: animate 2.5s linear infinite;
            animation-delay: 0s;
        }
        section :nth-child(2){
            animation: animate 2.5s linear infinite;
            animation-delay: 0.5s;
        }
        section :nth-child(3){
            animation: animate 2.5s linear infinite;
            animation-delay: 1s;
        }
        section :nth-child(4){
            animation: animate 2.5s linear infinite;
            animation-delay: 1.5s;
        }
        section :nth-child(5){
            animation: animate 2.5s linear infinite;
            animation-delay: 2s;
        }
        @keyframes animate{
            0%, 20%, 100%{
                transform: translateY(0px);
            }
            10%{
                transform: translateY(-30px);
            }
        }
        
    </style>
</head>
<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
</body>
</html>
