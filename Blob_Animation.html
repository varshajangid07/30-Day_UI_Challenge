<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e2889f;
            color: white;
        }
        .square{
            position: absolute;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .square span:nth-child(1){
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid #fff;
            border-radius: 35% 60% 65% 35% / 40% 44% 55% 60%;
            transition: 0.5s;
            animation: animate1 5s linear infinite;
        }
        .square:hover span:nth-child(1){
            border: none;
            background:#17191d;
        }
        .square span:nth-child(2){
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid #fff;
            border-radius: 35% 60% 65% 35% / 40% 44% 55% 60%;
            transition: 0.5s;
            animation: animate2 8s linear infinite;
        }
        .square:hover span:nth-child(2){
            border: none;
            background:#17191d;
        }
        .square span:nth-child(3){
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid #fff;
            border-radius: 35% 60% 65% 35% / 40% 44% 55% 60%;
            transition: 0.5s;
            animation: animate1 10s linear infinite;
        }
        .square:hover span:nth-child(3){
            border: none;
            background: #17191d;
        }
        @keyframes animate1{
            0%{
                transform:rotate(0deg);
            }
            100%{
                transform:rotate(360deg);
            }
        }
        @keyframes animate2{
            0%{
                transform:rotate(360deg);
            }
            100%{
                transform:rotate(0deg);
            }
        }
        .content{
            position: relative;
            padding: 40px 60px;
            text-align: center;
            transition: 0.5s;
            z-index: 100;
        }
        .content a{
            position: relative;
            display: inline-block;
            margin: 10px;
            border: 3px solid #fff;
            padding: 10px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            border-radius: 70% 30% 45% 55% / 50% 45% 55% 50%;
        }
        .content a:hover{
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="square">
        <span></span>
        <span></span>
        <span></span>
        <div class="content">
            <h2>Tittle</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Et vel at atque voluptatem obcaecati adipisci facilis ea consequatur rerum reprehenderit, voluptatum necessitatibus porro in placeat mollitia debitis dicta totam officiis!</p>
            <a href="#">Read more</a>
        </div>
    </div>
</body>
</html>
