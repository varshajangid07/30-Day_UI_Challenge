<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(20, 20, 20);
            overflow: hidden;
            height: 100vh;
        }
        .btn{
            width: 150px;
            height: 50px;
            padding: 20px;
            background-color: rgb(199, 199, 199);
            color: rgb(0, 0, 0);
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 15px;
            position: relative;
            z-index: 0;
        }
        .btn::after{
            content: "";
            z-index: -1;
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgb(133, 133, 133);
            left: 0;
            top: 0;
            border-radius: 15px;
        }
        .btn::before{
            content: "";
            background: linear-gradient(45deg, #E81416, #FFA500, #FAEB36, #70369D,#E81416 );
            position: absolute;
            top: -2px;
            left:-2px;
            background-size: 600%;
            width: calc(100% + 5px); 
            height: calc(100% + 5px);
            z-index: -2;
            filter: blur(8px);
            animation: glowing 20s linear infinite;
            transition: opacity .2s ease-in;
            border-radius: 10px;
            opacity: 1;
        }
        @keyframes glowing{
            0%{
                background-position: 0 0;
            }
            50%{
                background-position: 400% 0;
            }
            100%{
                background-position: 0 0;
            }
        }
        .btn:hover::before{
            opacity: 1;
        }
        .btn:active:after{
            background: transparent;
        }
        .btn:active{
            color: rgb(255, 255, 255);
            font-weight:bold;
        }
    </style>
</head>
<body>
    <button class="btn">Hover me!</button>
</body>
</html>
