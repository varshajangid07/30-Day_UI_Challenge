<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Reveal</title>
  <style>
    body {
      display: flex; 
      justify-content: center; 
      align-items: center;
      height: 100vh; 
      margin: 0; 
      background: #0a0a0a; 
      color: #ffffff;
      font-family: -apple-system, sans-serif;
      perspective: 1000px;
    }

    .card {
      width: 280px; 
      padding: 40px;
      background: #1a1a1a; 
      border-radius: 16px;
      border: 1px solid #333;
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .card:hover {
      transition: transform 0.1s ease-out; 
    }

    .stagger {
      opacity: 0.3;
      transform: translateY(15px);
      transition: all 0.5s ease;
    }

    h2.stagger { margin: 0 0 12px 0; font-size: 1.5rem; }
    p.stagger { margin: 0; color: #888; line-height: 1.5; }

    .card:hover .stagger {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover h2.stagger { transition-delay: 0s; }
    .card:hover p.stagger  { transition-delay: 0.1s; }
  </style>
</head>
<body>

  <div class="card" id="card">
    <h2 class="stagger">3D Cursor-Tilt Card with Staggered Reveal</h2>
    <p class="stagger">This text slides in sequentially while the entire card physically tracks your mouse movement.</p>
  </div>

  <script>
    const card = document.getElementById('card');    
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      card.style.transform = `rotateX(${-y / 15}deg) rotateY(${x / 15}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
  </script>

</body>
</html>
