<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Jelly Hover Text</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@900&display=swap');

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        p{
            color: rgb(0, 208, 255);
            font-size: 50px;
            text-shadow: 0 0 5px rgb(78, 255, 255);
        }
        h1 {
            cursor: pointer;
        }

        h1 span {
            position: relative;
            font-family: 'Lato', sans-serif;
            color: #00f2fe;
            display: inline-block;
            font-size: 5rem;
            text-shadow:
                0 1px 0 #008c99,
                0 2px 0 #008c99,
                0 3px 0 #006873,
                0 4px 0 #006873,
                0 5px 0 #00454c,
                0 6px 0 transparent,
                0 7px 0 transparent,
                0 8px 0 transparent,
                0 9px 0 transparent,
                0 10px 10px rgba(0, 0, 0, 0.6);
            transition: all 0.5s ease-out;
            transform-origin: bottom;
        }

        h1:hover span {
            animation: animate 1s ease-in-out infinite alternate;
        }

        h1 span:nth-child(2) {
            animation-delay: 0.1s;
        }

        h1 span:nth-child(3) {
            animation-delay: 0.2s;
        }

        h1 span:nth-child(4) {
            animation-delay: 0.3s;
        }

        h1 span:nth-child(5) {
            animation-delay: 0.4s;
        }

        h1 span:nth-child(6) {
            animation-delay: 0.5s;
        }

        @keyframes animate{
            0% {
                transform: scale(1, 1) translateY(0);
                filter: hue-rotate(0deg);
            }

            15% {
                transform: scale(1.3, 0.7) translateY(0);
            }

            40% {
                transform: scale(0.8, 1.2) translateY(-30px);
            }

            100% {
                transform: scale(1, 1) translateY(-30px);
                filter: hue-rotate(130deg) brightness(1.2);
                text-shadow:
                    0 1px 0 #008c99,
                    0 2px 0 #008c99,
                    0 3px 0 #006873,
                    0 4px 0 #006873,
                    0 5px 0 #00454c,
                    0 6px 0 #00454c,
                    0 7px 0 #00454c,
                    0 15px 25px rgba(0, 242, 254, 0.8), 0 60px 20px rgba(0, 0, 0, 0.5);
            }
        }
    </style>
</head>

<body>

    <p>Neon Jelly Hover Text</p>
    <h1>
        <span>H</span>
        <span>E</span>
        <span>L</span>
        <span>L</span>
        <span>O</span>
        <span>!</span>
    </h1>

</body>

</html>
