<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Cinematic Scale</title>
    <style>
        body {
            margin: 0;
            background: url('https://i.pinimg.com/736x/dc/a3/3e/dca33e2036d2b133bd85774895ab9dd8.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        body> :nth-child(1) {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content-wrapper {
            opacity: 0;
            transform: scale(0.5);
            filter: blur(15px);
            will-change: transform, opacity, filter;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out, filter 0.1s ease-out;
        }

        h1 {
            margin: 0;
            font-size: 5rem;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        p {
            margin-top: 16px;
            font-size: 1.5rem;
            color: #d1d1d6;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div>
        <h1>Scroll down</h1>
    </div>
    <section>
        <div class="content-wrapper">
            <h1>Future of Design</h1>
            <p>Experience the next generation of web animation.</p>
        </div>
    </section>
    <section>
        <div class="content-wrapper">
            <h1>Immersive Depth</h1>
            <p>Content scales dynamically as you scroll.</p>
        </div>
    </section>
    <section>
        <div class="content-wrapper">
            <h1>Cinematic Focus</h1>
            <p>Blur and scale create a camera-lens effect.</p>
        </div>
    </section>
    <section>
        <div class="content-wrapper">
            <h1>Limitless Scope</h1>
            <p>Welcome to the premium web experience.</p>
        </div>
    </section>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sections = document.querySelectorAll('section');

            function onScroll() {
                const viewportCenter = window.innerHeight / 2;

                sections.forEach(section => {
                    const content = section.querySelector('.content-wrapper');
                    const rect = section.getBoundingClientRect();

                    const sectionCenter = rect.top + (rect.height / 2);
                    const distance = Math.abs(viewportCenter - sectionCenter);
                    let percentage = distance / (window.innerHeight / 1.5);
                    percentage = Math.max(0, Math.min(1, percentage));
                    const scale = 1.3 - (percentage * 0.8);

                    const opacity = 1 - percentage;

                    const blur = percentage * 15;

                    content.style.transform = `scale(${scale})`;
                    content.style.opacity = opacity;
                    content.style.filter = `blur(${blur}px)`;
                });
            }

            window.addEventListener('scroll', () => {
                window.requestAnimationFrame(onScroll);
            });

            onScroll();
        });
    </script>
</body>
</html>
