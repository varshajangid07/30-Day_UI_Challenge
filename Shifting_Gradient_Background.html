<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifting Gradient Background</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(-45deg, #0f172a,#1e1b4b, #020617, #082f49);
            background-size: 400% 400%;
            animation: animate 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            text-align: center;
            padding: 0 20px;
            color: #ffffff;
        }

        p {
            max-width: 600px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        @keyframes animate{
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body>
    <h1>Shifting Gradient background</h1>
    <h2>Lorem ipsum</h2>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Iure repellendus laboriosam qui sequi blanditiis magni recusandae nemo dolorem dolorum repellat excepturi optio, eum voluptate earum reprehenderit, maiores harum incidunt sint.</p>
</body>
</html>
