<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Marquee</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #050505;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }

    h1{
      color: #ccff00;
      font-size: 50px;
    }

    .marquee-wrapper {
      position: relative;
      width: 100vw;
      padding: 1rem 0;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: scroll-left 15s linear infinite;
    }

    .marquee-track.reverse {
      animation-direction: reverse;
      animation-duration: 20s;
    }

    .marquee-content {
      display: flex;
      gap: 3rem;
      padding: 0 1.5rem;
    }

    .text-item {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -2px;
      white-space: nowrap;
    }

    .filled {
      color: #ffffff;
    }

    .outlined {
      color: transparent;
      -webkit-text-stroke: 2px rgba(255, 255, 255, 0.3);
    }

    .accent {
      color: #ccff00;
    }

    @keyframes scroll-left {
      to {
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <h1>Infinite Marquee</h1>
  <div class="marquee-wrapper">
    <div class="marquee-track">
      <div class="marquee-content">
        <span class="text-item filled">Innovation</span>
        <span class="text-item outlined">Design</span>
        <span class="text-item accent">Motion</span>
        <span class="text-item filled">Performance</span>
        <span class="text-item outlined">Scale</span>
      </div>
      <div class="marquee-content">
        <span class="text-item filled">Innovation</span>
        <span class="text-item outlined">Design</span>
        <span class="text-item accent">Motion</span>
        <span class="text-item filled">Performance</span>
        <span class="text-item outlined">Scale</span>
      </div>
    </div>
  </div>

  <div class="marquee-wrapper">
    <div class="marquee-track reverse">
      <div class="marquee-content">
        <span class="text-item outlined">Frontend</span>
        <span class="text-item filled">Architecture</span>
        <span class="text-item accent">Animation</span>
        <span class="text-item filled">Creative</span>
        <span class="text-item outlined">Code</span>
      </div>
      <div class="marquee-content">
        <span class="text-item outlined">Frontend</span>
        <span class="text-item filled">Architecture</span>
        <span class="text-item accent">Animation</span>
        <span class="text-item filled">Creative</span>
        <span class="text-item outlined">Code</span>
      </div>
    </div>
  </div>
</body>
</html>
