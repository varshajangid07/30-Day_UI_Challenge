<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splitig Blocks</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: rgb(20, 20, 20);
        }
        .box-container {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
        }
        .box1 {
            width: 100px;
            height: 100px;
            background-color: rgb(1, 1, 3);
        }
        .box2 {
            width: 100px;
            height: 100px;
            background-color: rgb(111, 131, 206);
        }
        .box3 {
            width: 100px;
            height: 100px;
            background-color: rgb(5, 50, 212);
        }
        .box {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 10px;
            transition: transform 0.4s ease 99999s;
        }
        .box-container:hover .box {
            transition: transform 0.4s ease 0s; 
        }
        .box-container:hover .box1 {
            transform: translateX(-110px);
        }
        .box-container:hover .box2 {
            transform: translateX(0);
        }
        .box-container:hover .box3 {
            transform: translateX(110px);
        }
    </style>
</head>

<body>
    <div class="box-container">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
    </div>
</body>
</html>
