    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            display: flex;
            flex-direction: column;
            align-items:center;
            background: rgb(43, 43, 43);
            padding: 50px;
            gap: 20px;
            color: white;
        }
        p{
            font-size: 30px;
        }
        section{
            position: relative;
            width: 80%;
            height: 500px;
            border: 5px solid black;
            border-radius: 30px;
            background-color: rgb(24, 24, 24);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        section .row{
            position: relative;
            width: 100%;
            left: -20vw;      
            top: -20vh;
            display: flex;
            padding: 20px 0;
            white-space: nowrap;
            font-size: 50px;
            transform: rotate(-30deg);
        }
        i{
            color: rgb(0, 0, 0, 0.5);
            transition: 1s;
            padding: 0 5px;
            user-select: none;
            cursor: default;
        }
        i:hover{
            color: aqua;
            text-shadow: 0 0 100px aqua;
            transition: 0s;
        }
        section .row div{
            animation: moving 80s linear infinite;
            animation-delay: -80s;
        }
        section .row div:nth-child(2){
            animation: moving2 80s linear infinite;
            animation-delay: -40s;
        }
        @keyframes moving {
            0%{
                transform: translateX(100%);
            }
            100%{
                transform: translateX(-100%);
            }
        }
        @keyframes moving2 {
            0%{
                transform: translateX(0%);
            }
            100%{
                transform: translateX(-200%);
            }
        }
    </style>
</head>
