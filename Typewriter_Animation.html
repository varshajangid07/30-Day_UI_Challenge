<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Animation</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }

        h1 {
            margin-top: -90px;
            margin-bottom: 50px;
            color: #808080;
        }

        .typewriter-container {
            display: inline-block;
        }

        .typewriter-text {
            width: 12ch;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #58a6ff;
            font-size: 24px;
            font-weight: 600;
            animation: animate 2s steps(12, end), blink-cursor .75s step-end infinite;
        }

        @keyframes animate {
            from {
                width: 0;
            }
            to {
                width: 12ch;
            }
        }

        @keyframes blink-cursor {
            from,
            to {
                border-color: transparent;
            }
            50% {
                border-color: #58a6ff;
            }
        }
    </style>
</head>
<body>
    <h1>Typewriter Animation</h1>
    <div class="typewriter-container">
        <div class="typewriter-text">Hello World!</div>
    </div>
</body>
</html>
