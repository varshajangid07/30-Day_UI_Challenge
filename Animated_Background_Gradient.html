<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Background Gradient</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .box{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: linear-gradient(-45deg, #ffffff 0%, #ffffff 25%, #f06598 25%, #f06598 50%, #fff 50%, #fff 75%, #f06598 75%, #f06598 100%);
            background-size: 40px 40px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 1), inset 0 0 5px rgba(0, 0, 0, 1),  0 0 0 2px #ed1572;
            border-radius: 20px;
            animation: animate 2s linear infinite;
            cursor: pointer;
        }
        .box div{
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: #fff;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 1), 0 0 0 2px #ed1572;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        @keyframes animate{
            0%{
                background-position: 0;
            }
            100%{
                background-position: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div><h1>Hello World!!</h1></div>
    </div>
</body>
</html>
